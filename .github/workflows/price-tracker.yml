name: Daily Price Tracker

on:
  schedule:
    # Runs 3x daily (every 8 hours) - leaves headroom for new sets
    - cron: '0 2 * * *'   # 2 AM UTC (8 PM MST)
    - cron: '0 10 * * *'  # 10 AM UTC (4 AM MST)
    - cron: '0 18 * * *'  # 6 PM UTC (12 PM MST)
  workflow_dispatch: # Allow manual trigger

jobs:
  track-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch@2

      - name: Run price tracker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/track-prices.js
