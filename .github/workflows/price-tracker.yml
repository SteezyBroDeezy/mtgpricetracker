name: Daily Price Tracker
on:
  schedule:
    # Run once daily at 8 AM UTC (2 AM MST) — after Scryfall's nightly price update
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger
jobs:
  track-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Kill if somehow stuck (should finish in ~8 min)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install firebase-admin node-fetch@2
      - name: Run price tracker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/track-prices.js
